<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Asparagus Pee & Coriander — An Office Investigation</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #f4f7e8 0%, #e8f0d4 100%);
      min-height: 100vh;
      padding: 20px;
      color: #2d3319;
    }

    .container {
      max-width: 640px;
      margin: 20px auto;
      background: #fffef8;
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 8px 32px rgba(76, 99, 28, 0.12);
      border: 1px solid #e4ebcf;
    }

    h1 {
      font-size: 28px;
      color: #4a6b1f;
      margin-bottom: 8px;
      line-height: 1.2;
    }

    .subtitle {
      color: #7a8960;
      margin-bottom: 28px;
      font-size: 15px;
      line-height: 1.5;
    }

    .progress-bar {
      height: 4px;
      background: #e4ebcf;
      border-radius: 2px;
      margin-bottom: 28px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #7aa83d, #a3c962);
      transition: width 0.4s ease;
      border-radius: 2px;
    }

    .question {
      margin-bottom: 24px;
    }

    .question-number {
      color: #a3c962;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .question-text {
      font-size: 19px;
      font-weight: 600;
      margin-bottom: 6px;
      line-height: 1.3;
    }

    .question-hint {
      color: #7a8960;
      font-size: 14px;
      margin-bottom: 16px;
      font-style: italic;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .option {
      padding: 14px 18px;
      background: #f7faed;
      border: 2px solid #e4ebcf;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s ease;
      font-size: 15px;
      text-align: left;
      font-family: inherit;
      color: #2d3319;
    }

    .option:hover {
      background: #edf3db;
      border-color: #a3c962;
      transform: translateY(-1px);
    }

    .option.selected {
      background: #7aa83d;
      color: white;
      border-color: #4a6b1f;
    }

    .slider-container {
      padding: 12px 4px;
    }

    .slider-labels {
      display: flex;
      justify-content: space-between;
      margin-bottom: 12px;
      font-size: 13px;
      color: #7a8960;
    }

    .slider-labels span {
      max-width: 45%;
    }

    .slider-labels span:last-child {
      text-align: right;
    }

    input[type="range"] {
      width: 100%;
      height: 8px;
      border-radius: 4px;
      background: linear-gradient(90deg, #7aa83d, #d4a574, #c85a3f);
      outline: none;
      -webkit-appearance: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: #fffef8;
      border: 3px solid #4a6b1f;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
    }

    input[type="range"]::-moz-range-thumb {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: #fffef8;
      border: 3px solid #4a6b1f;
      cursor: pointer;
    }

    .slider-value {
      text-align: center;
      margin-top: 12px;
      font-size: 16px;
      font-weight: 600;
      color: #4a6b1f;
    }

    input[type="text"] {
      width: 100%;
      padding: 12px 16px;
      font-size: 15px;
      border: 2px solid #e4ebcf;
      border-radius: 10px;
      background: #f7faed;
      font-family: inherit;
      color: #2d3319;
    }

    input[type="text"]:focus {
      outline: none;
      border-color: #7aa83d;
    }

    .buttons {
      display: flex;
      justify-content: space-between;
      margin-top: 28px;
      gap: 12px;
    }

    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: inherit;
    }

    .btn-primary {
      background: #4a6b1f;
      color: white;
      flex: 1;
    }

    .btn-primary:hover:not(:disabled) {
      background: #3a5418;
      transform: translateY(-1px);
    }

    .btn-primary:disabled {
      background: #c4cfa8;
      cursor: not-allowed;
    }

    .btn-secondary {
      background: transparent;
      color: #7a8960;
      border: 2px solid #e4ebcf;
    }

    .btn-secondary:hover {
      background: #f7faed;
    }

    .intro-emoji,
    .results-emoji {
      font-size: 48px;
      margin-bottom: 12px;
    }

    .stat-card {
      background: #f7faed;
      border-radius: 12px;
      padding: 18px;
      margin-bottom: 12px;
      border-left: 4px solid #7aa83d;
    }

    .stat-number {
      font-size: 32px;
      font-weight: 700;
      color: #4a6b1f;
    }

    .stat-label {
      font-size: 14px;
      color: #7a8960;
      margin-top: 4px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }

    .correlation-box {
      background: linear-gradient(135deg, #fff8e8, #fdefc9);
      border-radius: 12px;
      padding: 20px;
      margin: 20px 0;
      border: 1px solid #e8c988;
    }

    .correlation-box h3 {
      color: #8b5a1f;
      margin-bottom: 8px;
      font-size: 17px;
    }

    .correlation-box p {
      font-size: 14px;
      line-height: 1.5;
      color: #5c4418;
    }

    .science-blurb {
      background: #f7faed;
      border-radius: 12px;
      padding: 20px;
      margin-top: 20px;
      font-size: 14px;
      line-height: 1.6;
      color: #4a5438;
    }

    .science-blurb h3 {
      color: #4a6b1f;
      margin-bottom: 10px;
      font-size: 16px;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: #7a8960;
    }

    .response-count {
      text-align: center;
      color: #7a8960;
      font-size: 13px;
      margin-top: 16px;
      font-style: italic;
    }

    .error {
      background: #fde8e0;
      color: #8b3a1f;
      padding: 12px;
      border-radius: 8px;
      margin-top: 12px;
      font-size: 14px;
    }

    .config-warning {
      background: #fff0d4;
      color: #8b5a1f;
      padding: 16px;
      border-radius: 10px;
      margin-bottom: 20px;
      font-size: 14px;
      line-height: 1.5;
      border: 1px solid #e8c988;
    }

    .config-warning code {
      background: #fffef8;
      padding: 2px 6px;
      border-radius: 4px;
      font-family: 'SF Mono', Monaco, monospace;
      font-size: 13px;
    }
  </style>
</head>

<body>
  <div class="container">
    <div id="app"></div>
  </div>

  <!-- Supabase JS client -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    // ============================================================
    // CONFIGURE ME: paste your Supabase project URL and anon key
    // Find these in: Supabase dashboard → Project Settings → API
    // ============================================================
    const SUPABASE_URL = 'https://jqbejybxjrmkmwoqtyey.supabase.co';
    const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpxYmVqeWJ4anJta213b3F0eWV5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzODA2NTQsImV4cCI6MjA5MTk1NjY1NH0.c2plhkbNYLnDFl8IFcSI8BIGLOom9dg4Q1tiWa-bKls';
    // ============================================================

    const configured =
      !SUPABASE_URL.includes('YOUR-PROJECT') &&
      !SUPABASE_ANON.includes('YOUR-ANON-KEY');

    const supabase = configured
      ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON)
      : null;

    const questions = [
      {
        id: 'asparagus_producer', number: 'Question 1 of 6',
        text: 'After eating asparagus, does your pee smell... distinctive?',
        hint: 'No judgment. Science needs answers.',
        type: 'single',
        options: [
          { value: 'yes', label: 'Yes, unmistakably' },
          { value: 'no', label: 'No, never noticed anything' },
          { value: 'never_checked', label: "Honestly, I've never checked" },
          { value: 'no_asparagus', label: "I don't eat asparagus" }
        ]
      },
      {
        id: 'asparagus_detector', number: 'Question 2 of 6',
        text: 'Have you ever smelled it after someone else ate asparagus?',
        hint: 'Shared bathrooms, partners, suspicious roommates — all valid sources.',
        type: 'single',
        options: [
          { value: 'yes', label: 'Yes, definitely' },
          { value: 'maybe', label: 'Maybe once or twice' },
          { value: 'no', label: 'Never' },
          { value: 'decline', label: 'I refuse to answer this at work' }
        ]
      },
      {
        id: 'coriander_rating', number: 'Question 3 of 6',
        text: 'How do you feel about coriander (the fresh green leaves)?',
        hint: 'Also known as cilantro. The herb, not the seed.',
        type: 'slider',
        min: 1, max: 7,
        labels: ['Put it on everything', 'Tastes like soap or betrayal'],
        valueLabels: {
          1: '❤️ Love it on everything',
          2: '😊 Really enjoy it',
          3: '🙂 Like it',
          4: '😐 Neutral / no strong opinion',
          5: '🙁 Not a fan',
          6: '😖 Actively dislike it',
          7: '🧼 Tastes like soap or betrayal'
        }
      },
      {
        id: 'coriander_soapy', number: 'Question 4 of 6',
        text: 'If you dislike coriander, does it taste specifically soapy or metallic?',
        hint: "This is the telltale genetic signature — not just 'I don't like the flavor'.",
        type: 'single',
        options: [
          { value: 'soapy', label: 'Yes, soapy or metallic' },
          { value: 'just_dislike', label: "No, I just don't like the flavor" },
          { value: 'love_it', label: 'I love coriander, this question is offensive' },
          { value: 'neutral', label: "Neutral / haven't thought about it" }
        ]
      },
      {
        id: 'control_food', number: 'Question 5 of 6',
        text: 'Quick reality check: how do you feel about blue cheese?',
        hint: "Helps us tell 'genetic quirk' apart from 'generally fussy eater'.",
        type: 'single',
        options: [
          { value: 'love', label: 'Love it' },
          { value: 'tolerate', label: 'Can tolerate it' },
          { value: 'hate', label: 'Absolutely not' },
          { value: 'never_tried', label: "Never tried it" }
        ]
      },
      {
        id: 'name', number: 'Question 6 of 6',
        text: 'Name or nickname? (totally optional)',
        hint: "Leave blank to stay anonymous. Otherwise, fair game for lunch teasing.",
        type: 'text', optional: true
      }
    ];

    let state = { screen: 'intro', currentQuestion: 0, answers: {}, stats: null };
    const app = document.getElementById('app');

    const db = configured
      ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON)
      : null;

    function render() {
      if (state.screen === 'intro') renderIntro();
      else if (state.screen === 'question') renderQuestion();
      else if (state.screen === 'submitting') renderSubmitting();
      else if (state.screen === 'results') renderResults();
    }

    function configWarning() {
      if (configured) return '';
      return `
    <div class="config-warning">
      ⚠️ <strong>Setup needed:</strong> Edit this HTML file and replace
      <code>SUPABASE_URL</code> and <code>SUPABASE_ANON</code> at the top of the
      script with your Supabase project values. See the setup instructions.
    </div>
  `;
    }

    function renderIntro() {
      app.innerHTML = `
    ${configWarning()}
    <div class="intro-emoji">🥬</div>
    <h1>Asparagus Pee & Coriander</h1>
    <p class="subtitle">A highly unscientific office investigation into two of nature's most divisive smells and flavors. Takes about 90 seconds. Your answers are shared anonymously with the group at the end.</p>
    <button class="btn btn-primary" style="width:100%" onclick="startSurvey()" ${configured ? '' : 'disabled'}>Let's do this →</button>
    <p class="response-count" id="introCount">${configured ? 'Loading response count...' : ''}</p>
  `;
      if (configured) loadResponseCount();
    }

    async function loadResponseCount() {
      try {
        const { count, error } = await db
          .from('responses')
          .select('*', { count: 'exact', head: true });
        if (error) throw error;
        const el = document.getElementById('introCount');
        if (el) el.textContent = count > 0
          ? `${count} colleague${count === 1 ? '' : 's'} ${count === 1 ? 'has' : 'have'} already responded`
          : 'Be the first to respond';
      } catch (e) {
        console.error(e);
        const el = document.getElementById('introCount');
        if (el) el.textContent = '';
      }
    }

    function startSurvey() {
      state.screen = 'question';
      state.currentQuestion = 0;
      render();
    }

    function renderQuestion() {
      const q = questions[state.currentQuestion];
      const progress = (state.currentQuestion / questions.length) * 100;

      if (q.type === 'slider' && state.answers[q.id] === undefined) state.answers[q.id] = 4;
      const currentAnswer = state.answers[q.id];

      let inputHtml = '';
      if (q.type === 'single') {
        inputHtml = `<div class="options">` + q.options.map(opt => `
      <button class="option ${currentAnswer === opt.value ? 'selected' : ''}"
              onclick="selectOption('${q.id}', '${opt.value}')">${opt.label}</button>
    `).join('') + `</div>`;
      } else if (q.type === 'slider') {
        const val = currentAnswer;
        inputHtml = `
      <div class="slider-container">
        <div class="slider-labels"><span>${q.labels[0]}</span><span>${q.labels[1]}</span></div>
        <input type="range" min="${q.min}" max="${q.max}" value="${val}"
               oninput="updateSlider('${q.id}', this.value)" id="slider_${q.id}">
        <div class="slider-value" id="sliderValue_${q.id}">${q.valueLabels[val]}</div>
      </div>`;
      } else if (q.type === 'text') {
        inputHtml = `<input type="text" placeholder="Your name (optional)" value="${currentAnswer || ''}"
                        oninput="updateText('${q.id}', this.value)" maxlength="40">`;
      }

      const canAdvance = q.optional || currentAnswer !== undefined;
      const isLast = state.currentQuestion === questions.length - 1;

      app.innerHTML = `
    <div class="progress-bar"><div class="progress-fill" style="width: ${progress}%"></div></div>
    <div class="question">
      <div class="question-number">${q.number}</div>
      <div class="question-text">${q.text}</div>
      <div class="question-hint">${q.hint}</div>
      ${inputHtml}
    </div>
    <div class="buttons">
      ${state.currentQuestion > 0 ? '<button class="btn btn-secondary" onclick="prevQuestion()">← Back</button>' : ''}
      <button class="btn btn-primary" onclick="nextQuestion()" ${canAdvance ? '' : 'disabled'}>
        ${isLast ? 'See the results →' : 'Next →'}
      </button>
    </div>
  `;
    }

    function selectOption(qid, value) { state.answers[qid] = value; render(); }
    function updateSlider(qid, value) {
      const val = parseInt(value);
      state.answers[qid] = val;
      const q = questions.find(x => x.id === qid);
      const labelEl = document.getElementById('sliderValue_' + qid);
      if (labelEl) labelEl.textContent = q.valueLabels[val];
    }
    function updateText(qid, value) { state.answers[qid] = value.trim(); }
    function prevQuestion() { if (state.currentQuestion > 0) { state.currentQuestion--; render(); } }
    function nextQuestion() {
      if (state.currentQuestion < questions.length - 1) {
        state.currentQuestion++;
        render();
      } else submitResponse();
    }

    async function submitResponse() {
      state.screen = 'submitting';
      render();
      try {
        const payload = {
          asparagus_producer: state.answers.asparagus_producer,
          asparagus_detector: state.answers.asparagus_detector,
          coriander_rating: state.answers.coriander_rating || 4,
          coriander_soapy: state.answers.coriander_soapy,
          control_food: state.answers.control_food,
          name: (state.answers.name || '').trim() || null
        };
        const { error } = await db.from('responses').insert(payload);
        if (error) throw error;
        await loadResults();
      } catch (e) {
        console.error(e);
        app.innerHTML = `
      <h1>Oops</h1>
      <div class="error">Couldn't save your response: ${e.message || 'unknown error'}</div>
      <button class="btn btn-primary" style="width:100%;margin-top:16px" onclick="submitResponse()">Retry</button>
    `;
      }
    }

    function renderSubmitting() {
      app.innerHTML = `<div class="loading">Saving your response and crunching the numbers...</div>`;
    }

    async function loadResults() {
      try {
        const { data, error } = await db
          .from('responses')
          .select('asparagus_producer, asparagus_detector, coriander_rating, coriander_soapy');
        if (error) throw error;

        const rows = data || [];
        const n = rows.length;
        const pct = (f) => n > 0 ? Math.round((rows.filter(f).length / n) * 100) : 0;

        const detSub = rows.filter(r => r.asparagus_detector === 'yes');
        const nonSub = rows.filter(r => r.asparagus_detector === 'no');
        const avg = (arr) => arr.length
          ? Number((arr.reduce((s, r) => s + (r.coriander_rating || 4), 0) / arr.length).toFixed(1))
          : null;

        state.stats = {
          n,
          producers: pct(r => r.asparagus_producer === 'yes'),
          detectors: pct(r => r.asparagus_detector === 'yes'),
          corianderHaters: pct(r => r.coriander_rating >= 6),
          soapyHaters: pct(r => r.coriander_soapy === 'soapy'),
          detectorAvgCoriander: avg(detSub),
          nonDetectorAvgCoriander: avg(nonSub),
          detectorCount: detSub.length,
          nonDetectorCount: nonSub.length,
        };
        state.screen = 'results';
        renderResults();
      } catch (e) {
        console.error(e);
        state.stats = { n: 0, producers: 0, detectors: 0, corianderHaters: 0, soapyHaters: 0 };
        state.screen = 'results';
        renderResults();
      }
    }

    function renderResults() {
      const s = state.stats;
      const n = s.n;

      let correlationText = '';
      if (s.detectorCount >= 2 && s.nonDetectorCount >= 2 &&
        s.detectorAvgCoriander !== null && s.nonDetectorAvgCoriander !== null) {
        const diff = s.detectorAvgCoriander - s.nonDetectorAvgCoriander;
        if (Math.abs(diff) < 0.5) {
          correlationText = `Asparagus detectors rate coriander at <strong>${s.detectorAvgCoriander}/7</strong>, non-detectors at <strong>${s.nonDetectorAvgCoriander}/7</strong>. Basically identical — no correlation in this group.`;
        } else if (diff > 0) {
          correlationText = `Asparagus detectors lean <strong>more anti-coriander</strong> (${s.detectorAvgCoriander}/7) than non-detectors (${s.nonDetectorAvgCoriander}/7). Interesting!`;
        } else {
          correlationText = `Plot twist: asparagus detectors actually lean <strong>more pro-coriander</strong> (${s.detectorAvgCoriander}/7) than non-detectors (${s.nonDetectorAvgCoriander}/7).`;
        }
      } else {
        correlationText = `Need more responses to compare detectors vs. non-detectors. Send this to more colleagues!`;
      }

      app.innerHTML = `
    <div class="results-emoji">📊</div>
    <h1>The Results Are In</h1>
    <p class="subtitle">Based on ${n} response${n === 1 ? '' : 's'} from the group.</p>
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-number">${s.producers}%</div><div class="stat-label">Produce smelly asparagus pee</div></div>
      <div class="stat-card"><div class="stat-number">${s.detectors}%</div><div class="stat-label">Can detect the smell</div></div>
      <div class="stat-card"><div class="stat-number">${s.corianderHaters}%</div><div class="stat-label">Dislike coriander</div></div>
      <div class="stat-card"><div class="stat-number">${s.soapyHaters}%</div><div class="stat-label">Taste coriander as soapy</div></div>
    </div>
    <div class="correlation-box">
      <h3>🔬 The correlation check</h3>
      <p>${correlationText}</p>
    </div>
    <div class="science-blurb">
      <h3>Why these two things might be linked</h3>
      <p>Both traits come from variations in your olfactory receptor genes — the proteins in your nose that detect specific smells. Roughly 20–50% of people produce the sulfurous compounds from asparagus, and a separate genetic variant determines who can actually smell them. Coriander aversion is linked to a receptor called OR6A2, which makes the herb taste soapy to some people. They're different genes, so any correlation here is basically vibes — but vibes are what office surveys are for.</p>
    </div>
    <button class="btn btn-primary" style="width:100%;margin-top:20px" onclick="resetSurvey()">Share with someone else</button>
  `;
    }

    function resetSurvey() {
      state = { screen: 'intro', currentQuestion: 0, answers: {}, stats: null };
      render();
    }

    render();
  </script>
</body>

</html>
